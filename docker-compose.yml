# StadiumMind AI - local full-stack (web + api + postgres + redis).
#
#   docker compose up --build
#   web -> http://localhost:3000   api -> http://localhost:8000/docs
#
# Real API keys are injected from the host environment (never committed):
#   GEMINI_API_KEY, FOOTBALL_DATA_API_KEY, GOOGLE_MAPS_API_KEY,
#   NEXT_PUBLIC_GOOGLE_MAPS_API_KEY, JWT_SECRET.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: stadium
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stadium}
      POSTGRES_DB: stadiummind
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stadium"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    environment:
      ENVIRONMENT: development
      PORT: 8080
      DATABASE_URL: postgresql+psycopg://stadium:${POSTGRES_PASSWORD:-stadium}@postgres:5432/stadiummind
      REDIS_URL: redis://redis:6379/0
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      RATE_LIMIT_PER_MINUTE: 240
      JWT_SECRET: ${JWT_SECRET:-change-me-in-prod}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      FOOTBALL_DATA_API_KEY: ${FOOTBALL_DATA_API_KEY:-}
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
    ports:
      - "8000:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: ./frontend/app-nextjs
      args:
        NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${NEXT_PUBLIC_GOOGLE_MAPS_API_KEY:-}
    environment:
      BACKEND_URL: http://api:8080
    ports:
      - "3000:8080"
    depends_on:
      - api

volumes:
  pgdata:
